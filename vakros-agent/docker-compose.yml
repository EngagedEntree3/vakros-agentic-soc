version: "3.9"

# Vakros Full Stack — Docker Compose
# Usage: docker compose up
# Requires .env file with SUPABASE_URL, SUPABASE_SERVICE_KEY, ANTHROPIC_API_KEY

services:

  # ── Webhook ingestion server ──────────────────────────────────────────
  ingest:
    build: .
    command: python webhook_server.py
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      AUTO_TRIAGE_THRESHOLD: "${AUTO_TRIAGE_THRESHOLD:-7}"
      WORKER_CONCURRENCY: "4"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Scheduled threat hunt (runs every hour) ───────────────────────────
  hunter:
    build: .
    command: >
      sh -c "while true; do
        python hunt_runner.py --all --hours 2 --json;
        sleep 3600;
      done"
    env_file: .env
    restart: unless-stopped
    depends_on:
      - ingest

  # ── SOC dashboard (Next.js) ───────────────────────────────────────────
  dashboard:
    build:
      context: ../vakros-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_KEY: "${SUPABASE_SERVICE_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    restart: unless-stopped

  # ── Customer portal (Next.js) ─────────────────────────────────────────
  portal:
    build:
      context: ../vakros-portal
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
    restart: unless-stopped
